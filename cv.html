    <main>
    <h1 class="page-title">cv/resume</h1>

    <p class="lead">You can see my academic CV and professional resume below.</p>

    <div class="doc-viewer">
      <div class="doc-control">
        <span class="doc-status" aria-live="polite">looking at: <strong id="doc-current">cv</strong></span>
        <button type="button" id="doc-flip-button" class="doc-flip-button" aria-label="Flip to other document">
          <span class="doc-flip-arrow" aria-hidden="true">↺</span>
          <span class="doc-flip-text">flip to my <em id="doc-other">resume</em></span>
        </button>
      </div>

      <iframe id="doc-frame" class="doc-frame" src="cv.pdf" title="cv preview"></iframe>
    </div>

    <script>
      (function () {
        var docs = { cv: 'cv.pdf', resume: 'resume.pdf' };
        var current = 'cv';
        var frame = document.getElementById('doc-frame');
        var currentEl = document.getElementById('doc-current');
        var otherEl = document.getElementById('doc-other');
        var btn = document.getElementById('doc-flip-button');
        var prefersReducedMotion = window.matchMedia &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        function flip() {
          var next = current === 'cv' ? 'resume' : 'cv';
          var otherAfter = next === 'cv' ? 'resume' : 'cv';

          function applySwap() {
            frame.src = docs[next];
            frame.title = next + ' preview';
            currentEl.textContent = next;
            otherEl.textContent = otherAfter;
            current = next;
          }

          if (prefersReducedMotion) {
            applySwap();
            return;
          }

          frame.classList.add('is-flipping');
          window.setTimeout(function () {
            applySwap();
            window.setTimeout(function () {
              frame.classList.remove('is-flipping');
            }, 30);
          }, 220);
        }

        btn.addEventListener('click', flip);
      })();
    </script>
  </main>
